<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Robot head (pixel art style) -->
  <rect x="25" y="10" width="50" height="45" rx="4" fill="#5B9BD5"/>
  <!-- Eyes -->
  <rect x="33" y="23" width="12" height="12" fill="#fff"/>
  <rect x="55" y="23" width="12" height="12" fill="#fff"/>
  <rect x="37" y="27" width="6" height="6" fill="#1a1a2e"/>
  <rect x="59" y="27" width="6" height="6" fill="#1a1a2e"/>
  <!-- Antenna -->
  <rect x="47" y="2" width="6" height="10" fill="#5B9BD5"/>
  <rect x="44" y="0" width="12" height="5" rx="2" fill="#7EC8E3"/>
  <!-- Mouth (kanban columns) -->
  <rect x="32" y="42" width="8" height="7" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="46" y="42" width="8" height="7" rx="1" fill="#F59E0B" opacity="0.9"/>
  <rect x="60" y="42" width="8" height="7" rx="1" fill="#22C55E" opacity="0.9"/>
  <!-- Body -->
  <rect x="30" y="57" width="40" height="30" rx="3" fill="#4A7FC1"/>
  <!-- Arms -->
  <rect x="10" y="57" width="18" height="12" rx="4" fill="#5B9BD5"/>
  <rect x="72" y="57" width="18" height="12" rx="4" fill="#5B9BD5"/>
  <!-- Legs -->
  <rect x="33" y="88" width="14" height="12" rx="3" fill="#4A7FC1"/>
  <rect x="53" y="88" width="14" height="12" rx="3" fill="#4A7FC1"/>
</svg>
